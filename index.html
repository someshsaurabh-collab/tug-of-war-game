<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tug of War - Dice Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: #1a1a2e;
    color: #eee;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* ── SCREENS ── */
  .screen { display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; min-height: 100vh; }
  .screen.active { display: flex; }

  /* ── COIN TOSS ── */
  #coin-screen { gap: 24px; }
  #coin-screen h1 { font-size: 2.4rem; letter-spacing: 2px; color: #f0c040; text-shadow: 0 0 20px #f0c04066; }
  #coin-screen p { font-size: 1.1rem; color: #aaa; }

  .coin-container { perspective: 600px; }
  .coin {
    width: 120px; height: 120px; border-radius: 50%;
    position: relative; transform-style: preserve-3d;
    cursor: pointer; transition: transform 0.1s;
  }
  .coin.flipping { animation: coinFlip 1.6s ease-out forwards; }
  .coin-face {
    position: absolute; inset: 0; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 2.8rem; backface-visibility: hidden;
    border: 4px solid #b8860b;
  }
  .coin-heads { background: radial-gradient(circle at 35% 35%, #ffd700, #b8860b); }
  .coin-tails { background: radial-gradient(circle at 35% 35%, #c0c0c0, #696969); transform: rotateY(180deg); }

  @keyframes coinFlip {
    0%   { transform: rotateY(0); }
    100% { transform: rotateY(var(--flip-end)); }
  }

  #toss-btn {
    padding: 14px 40px; font-size: 1.1rem; font-weight: 700;
    background: linear-gradient(135deg, #f0c040, #e07b00);
    border: none; border-radius: 30px; color: #1a1a2e;
    cursor: pointer; letter-spacing: 1px;
    box-shadow: 0 4px 20px #f0c04044;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  #toss-btn:hover { transform: scale(1.06); box-shadow: 0 6px 28px #f0c04066; }
  #toss-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  #toss-result { font-size: 1.3rem; font-weight: 700; color: #f0c040; min-height: 2rem; text-align: center; }

  /* ── GAME SCREEN ── */
  #game-screen { gap: 0; padding: 16px; }

  .game-header {
    display: flex; align-items: center; justify-content: space-between;
    width: 100%; max-width: 900px; margin-bottom: 18px;
  }
  .game-title { font-size: 1.5rem; color: #f0c040; letter-spacing: 2px; font-weight: 800; }
  .rally-box {
    background: #16213e; border: 2px solid #f0c04066;
    border-radius: 12px; padding: 6px 18px; text-align: center;
  }
  .rally-label { font-size: 0.7rem; color: #aaa; letter-spacing: 1px; text-transform: uppercase; }
  .rally-count { font-size: 1.6rem; font-weight: 800; color: #f0c040; }

  /* ── PLAYERS ── */
  .players-row {
    display: flex; align-items: center; justify-content: space-between;
    width: 100%; max-width: 900px; margin-bottom: 18px; gap: 12px;
  }

  .player-card {
    flex: 1; border-radius: 16px; padding: 14px 18px;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    border: 3px solid transparent; transition: all 0.3s;
    position: relative;
  }
  .player-card.p1 { background: #2d0a1a; border-color: #cc005533; }
  .player-card.p2 { background: #0a1a2d; border-color: #0055cc33; }
  .player-card.active.p1 { border-color: #ff3399; box-shadow: 0 0 24px #ff339966; }
  .player-card.active.p2 { border-color: #3399ff; box-shadow: 0 0 24px #3399ff66; }

  .player-avatar { font-size: 2.8rem; line-height: 1; }
  .player-name { font-size: 1rem; font-weight: 700; letter-spacing: 1px; }
  .player-card.p1 .player-name { color: #ff3399; }
  .player-card.p2 .player-name { color: #3399ff; }
  .turn-indicator {
    font-size: 0.75rem; font-weight: 600; letter-spacing: 1px;
    padding: 3px 10px; border-radius: 20px; opacity: 0;
    transition: opacity 0.3s;
  }
  .player-card.active .turn-indicator { opacity: 1; }
  .player-card.p1 .turn-indicator { background: #ff339933; color: #ff3399; }
  .player-card.p2 .turn-indicator { background: #3399ff33; color: #3399ff; }

  /* ── BOARD ── */
  .board-wrapper { width: 100%; max-width: 900px; margin-bottom: 24px; }
  .board {
    display: flex; width: 100%; border-radius: 12px;
    overflow: hidden; box-shadow: 0 8px 40px #00000088;
  }
  .cell {
    flex: 1; aspect-ratio: 1 / 1.1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; position: relative;
    font-size: 1.1rem; font-weight: 700; transition: all 0.3s;
    min-width: 0;
  }
  .cell-num { font-size: 0.85rem; opacity: 0.7; }

  /* colour scheme matching screenshot */
  .cell.finish-p1   { background: #e91e8c; }
  .cell.p1-6        { background: #c2185b; }
  .cell.p1-5        { background: #d81b60; }
  .cell.p1-4        { background: #e91e8c; }
  .cell.p1-3        { background: #f06292; }
  .cell.p1-2        { background: #f48fb1; }
  .cell.p1-1        { background: #fce4ec; color: #333; }
  .cell.start       { background: #2e7d32; font-size: 0.8rem; font-weight: 800; letter-spacing: 1px; }
  .cell.p2-1        { background: #e3f2fd; color: #333; }
  .cell.p2-2        { background: #90caf9; color: #333; }
  .cell.p2-3        { background: #42a5f5; }
  .cell.p2-4        { background: #1e88e5; }
  .cell.p2-5        { background: #1565c0; }
  .cell.p2-6        { background: #0d47a1; }
  .cell.finish-p2   { background: #00bcd4; }

  .cell.finish-p1, .cell.finish-p2 {
    writing-mode: vertical-rl;
    font-size: 0.65rem; letter-spacing: 2px; font-weight: 800;
    padding: 6px 2px;
  }
  .cell.finish-p1 { text-orientation: mixed; transform: rotate(180deg); }

  /* piece */
  .piece {
    width: 34px; height: 34px; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #fffde7, #f9a825);
    border: 3px solid #fff;
    box-shadow: 0 2px 10px #0008, 0 0 0 2px #f9a82588;
    position: absolute;
    transition: none; /* we handle movement via JS class */
    font-size: 1rem; display: flex; align-items: center; justify-content: center;
    z-index: 10;
  }
  .piece.moving { animation: pieceJump 0.35s ease; }
  @keyframes pieceJump {
    0%   { transform: scale(1) translateY(0); }
    40%  { transform: scale(1.35) translateY(-10px); }
    100% { transform: scale(1) translateY(0); }
  }

  /* ── DICE AREA ── */
  .dice-area {
    display: flex; flex-direction: column; align-items: center; gap: 14px;
    margin-bottom: 8px;
  }
  .dice-wrap { perspective: 500px; }
  .dice {
    width: 80px; height: 80px; border-radius: 14px;
    background: #fff; color: #1a1a2e;
    display: flex; align-items: center; justify-content: center;
    font-size: 3rem; cursor: pointer;
    box-shadow: 0 4px 20px #0006, inset 0 2px 4px #fff8;
    user-select: none; transition: transform 0.15s;
    transform-style: preserve-3d;
  }
  .dice:hover:not(:disabled) { transform: scale(1.08); }
  .dice.rolling { animation: diceRoll 0.7s ease; }
  @keyframes diceRoll {
    0%   { transform: rotateX(0)   rotateY(0)   rotateZ(0)   scale(1);   }
    20%  { transform: rotateX(180deg) rotateY(90deg)  rotateZ(45deg)  scale(1.15); }
    50%  { transform: rotateX(360deg) rotateY(180deg) rotateZ(135deg) scale(0.9);  }
    75%  { transform: rotateX(450deg) rotateY(270deg) rotateZ(180deg) scale(1.1);  }
    100% { transform: rotateX(540deg) rotateY(360deg) rotateZ(225deg) scale(1);    }
  }
  .dice-btn-label {
    font-size: 0.85rem; color: #aaa; letter-spacing: 1px; text-transform: uppercase;
  }
  #roll-result { font-size: 1.1rem; font-weight: 700; min-height: 1.5rem; color: #f0c040; }

  /* ── WIN SCREEN ── */
  #win-screen { gap: 20px; position: relative; overflow: hidden; }
  .win-content { z-index: 10; display: flex; flex-direction: column; align-items: center; gap: 18px; text-align: center; }
  .win-avatar { font-size: 5rem; animation: winBounce 0.8s ease infinite alternate; }
  @keyframes winBounce { from { transform: scale(1) translateY(0); } to { transform: scale(1.12) translateY(-12px); } }
  .win-title { font-size: 3rem; font-weight: 900; letter-spacing: 3px; }
  .win-title.p1 { color: #ff3399; text-shadow: 0 0 30px #ff339966; }
  .win-title.p2 { color: #3399ff; text-shadow: 0 0 30px #3399ff66; }
  .win-subtitle { font-size: 1.2rem; color: #ccc; }
  .win-stats { font-size: 1rem; color: #aaa; }
  #play-again-btn {
    padding: 14px 40px; font-size: 1.1rem; font-weight: 700;
    background: linear-gradient(135deg, #f0c040, #e07b00);
    border: none; border-radius: 30px; color: #1a1a2e;
    cursor: pointer; letter-spacing: 1px;
    box-shadow: 0 4px 20px #f0c04044;
    transition: transform 0.15s;
    margin-top: 10px;
  }
  #play-again-btn:hover { transform: scale(1.06); }

  /* confetti */
  .confetti-piece {
    position: absolute; width: 10px; height: 14px; border-radius: 2px;
    opacity: 0; animation: confettiFall var(--dur) var(--delay) ease-in forwards;
    top: -20px; left: var(--x);
  }
  @keyframes confettiFall {
    0%   { opacity: 1; transform: translateY(0) rotate(0deg); }
    100% { opacity: 0.3; transform: translateY(110vh) rotate(var(--rot)); }
  }
</style>
</head>
<body>

<!-- ══════════════ COIN TOSS SCREEN ══════════════ -->
<div id="coin-screen" class="screen active">
  <h1>⚔️ TUG OF WAR</h1>
  <p>Flip the coin to decide who goes first!</p>
  <div class="coin-container">
    <div class="coin" id="coin">
      <div class="coin-face coin-heads">👑</div>
      <div class="coin-face coin-tails">⚡</div>
    </div>
  </div>
  <button id="toss-btn">Flip Coin</button>
  <div id="toss-result"></div>
</div>

<!-- ══════════════ GAME SCREEN ══════════════ -->
<div id="game-screen" class="screen">
  <div class="game-header">
    <div class="game-title">⚔️ TUG OF WAR</div>
    <div class="rally-box">
      <div class="rally-label">Rally</div>
      <div class="rally-count" id="rally-count">0</div>
    </div>
  </div>

  <div class="players-row">
    <!-- Player 1 -->
    <div class="player-card p1" id="card-p1">
      <div class="player-avatar">🦁</div>
      <div class="player-name">PLAYER 1</div>
      <div class="turn-indicator">YOUR TURN</div>
    </div>

    <!-- Dice -->
    <div class="dice-area">
      <div class="dice-wrap">
        <div class="dice" id="dice" title="Click to roll">🎲</div>
      </div>
      <div class="dice-btn-label">Tap to Roll</div>
      <div id="roll-result"></div>
    </div>

    <!-- Player 2 -->
    <div class="player-card p2" id="card-p2">
      <div class="player-avatar">🐯</div>
      <div class="player-name">PLAYER 2</div>
      <div class="turn-indicator">YOUR TURN</div>
    </div>
  </div>

  <div class="board-wrapper">
    <div class="board" id="board">
      <!-- cells injected by JS -->
    </div>
  </div>
</div>

<!-- ══════════════ WIN SCREEN ══════════════ -->
<div id="win-screen" class="screen">
  <div class="win-content">
    <div class="win-avatar" id="win-avatar">🦁</div>
    <div class="win-title" id="win-title">PLAYER 1 WINS!</div>
    <div class="win-subtitle">🎉 Congratulations!</div>
    <div class="win-stats" id="win-stats">Finished in 12 rallies</div>
    <button id="play-again-btn">Play Again</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
//  AUDIO  (Web Audio API — no external files)
// ═══════════════════════════════════════════
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new AudioCtx();
  return audioCtx;
}

function playDiceSound() {
  const ctx = getAudioCtx();
  const times = [0, 0.08, 0.18, 0.3, 0.44, 0.6];
  times.forEach((t, i) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'square';
    osc.frequency.setValueAtTime(300 + Math.random() * 200, ctx.currentTime + t);
    gain.gain.setValueAtTime(0.15, ctx.currentTime + t);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.07);
    osc.start(ctx.currentTime + t);
    osc.stop(ctx.currentTime + t + 0.08);
  });
}

function playCoinSound() {
  const ctx = getAudioCtx();
  [0, 0.15, 0.32, 0.5, 0.65, 0.77].forEach((t) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = 880 + Math.random() * 440;
    osc.type = 'sine';
    gain.gain.setValueAtTime(0.2, ctx.currentTime + t);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.12);
    osc.start(ctx.currentTime + t);
    osc.stop(ctx.currentTime + t + 0.13);
  });
}

function playWinSound() {
  const ctx = getAudioCtx();
  const notes = [523, 659, 784, 1047];
  notes.forEach((freq, i) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = freq;
    osc.type = 'sine';
    gain.gain.setValueAtTime(0.25, ctx.currentTime + i * 0.18);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.18 + 0.5);
    osc.start(ctx.currentTime + i * 0.18);
    osc.stop(ctx.currentTime + i * 0.18 + 0.55);
  });
}

// ═══════════════════════════════════════════
//  DICE FACES
// ═══════════════════════════════════════════
const DICE_FACES = ['', '⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];

// ═══════════════════════════════════════════
//  BOARD SETUP
// ═══════════════════════════════════════════
// Positions: -6..-1 = P1 side (towards P1 finish), 0 = start, 1..6 = P2 side
// -7 = P1 finish, +7 = P2 finish
const BOARD_CELLS = [
  { id: 'finish-p1', label: 'Player 1 Finish', cls: 'finish-p1' },
  { id: 'p1-6',      label: '6',               cls: 'p1-6' },
  { id: 'p1-5',      label: '5',               cls: 'p1-5' },
  { id: 'p1-4',      label: '4',               cls: 'p1-4' },
  { id: 'p1-3',      label: '3',               cls: 'p1-3' },
  { id: 'p1-2',      label: '2',               cls: 'p1-2' },
  { id: 'p1-1',      label: '1',               cls: 'p1-1' },
  { id: 'start',     label: 'Start',            cls: 'start' },
  { id: 'p2-1',      label: '1',               cls: 'p2-1' },
  { id: 'p2-2',      label: '2',               cls: 'p2-2' },
  { id: 'p2-3',      label: '3',               cls: 'p2-3' },
  { id: 'p2-4',      label: '4',               cls: 'p2-4' },
  { id: 'p2-5',      label: '5',               cls: 'p2-5' },
  { id: 'p2-6',      label: '6',               cls: 'p2-6' },
  { id: 'finish-p2', label: 'Player 2 Finish', cls: 'finish-p2' },
];

// Numeric positions: finish-p1=-7, p1-6=-6 ... p1-1=-1, start=0, p2-1=1...p2-6=6, finish-p2=7
function posToIndex(pos) { return pos + 7; } // maps -7..7 → 0..14

function buildBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  BOARD_CELLS.forEach((c, i) => {
    const div = document.createElement('div');
    div.className = `cell ${c.cls}`;
    div.id = `cell-${c.id}`;
    div.dataset.pos = i - 7; // -7 to 7
    div.innerHTML = `<span class="cell-num">${c.label}</span>`;
    board.appendChild(div);
  });

  // Create piece and place at start
  const piece = document.createElement('div');
  piece.className = 'piece';
  piece.id = 'piece';
  piece.textContent = '⭐';
  board.appendChild(piece);
}

function placePiece(pos) {
  const piece = document.getElementById('piece');
  const idx = posToIndex(pos);
  const cells = document.querySelectorAll('.cell');
  const cell = cells[idx];
  if (!cell) return;
  const board = document.getElementById('board');
  const boardRect = board.getBoundingClientRect();
  const cellRect = cell.getBoundingClientRect();
  const left = cellRect.left - boardRect.left + (cellRect.width - 34) / 2;
  const top  = cellRect.top  - boardRect.top  + (cellRect.height - 34) / 2;
  piece.style.left = left + 'px';
  piece.style.top  = top  + 'px';
}

// ═══════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════
const state = {
  currentPlayer: 1,   // 1 or 2
  piecePos: 0,        // -7..7
  rally: 0,
  rolling: false,
  gameOver: false,
};

const PLAYERS = {
  1: { name: 'Player 1', avatar: '🦁', cardId: 'card-p1', dir: -1, finish: -7 },
  2: { name: 'Player 2', avatar: '🐯', cardId: 'card-p2', dir:  1, finish:  7 },
};

function setActivePlayer(p) {
  state.currentPlayer = p;
  document.getElementById('card-p1').classList.toggle('active', p === 1);
  document.getElementById('card-p2').classList.toggle('active', p === 2);
}

function updateRally() {
  document.getElementById('rally-count').textContent = state.rally;
}

// ═══════════════════════════════════════════
//  DICE ROLL
// ═══════════════════════════════════════════
function rollDice() {
  if (state.rolling || state.gameOver) return;
  state.rolling = true;

  const dice = document.getElementById('dice');
  dice.classList.add('rolling');
  playDiceSound();
  document.getElementById('roll-result').textContent = '';

  // shuffle face while rolling
  let shuffles = 0;
  const shuffleId = setInterval(() => {
    dice.textContent = DICE_FACES[Math.floor(Math.random() * 6) + 1];
    shuffles++;
    if (shuffles > 8) clearInterval(shuffleId);
  }, 80);

  setTimeout(() => {
    dice.classList.remove('rolling');
    const roll = Math.floor(Math.random() * 6) + 1;
    dice.textContent = DICE_FACES[roll];

    const player = PLAYERS[state.currentPlayer];
    const newPos = state.piecePos + player.dir * roll;
    const finishPos = player.finish;

    state.rally++;
    updateRally();

    let msg = '';
    if (newPos === finishPos) {
      // Exact finish!
      movePiece(newPos);
      document.getElementById('roll-result').textContent = `${roll} — Exact finish! 🎉`;
      setTimeout(() => triggerWin(state.currentPlayer, state.rally), 600);
    } else if (Math.abs(newPos) > 6 && newPos !== finishPos) {
      // Overshoot — no move
      msg = `${roll} — Overshoot! No move.`;
      document.getElementById('roll-result').textContent = msg;
      nextTurn();
    } else {
      movePiece(newPos);
      document.getElementById('roll-result').textContent = `Rolled ${roll}`;
      nextTurn();
    }

    state.rolling = false;
  }, 900);
}

function movePiece(newPos) {
  state.piecePos = newPos;
  const piece = document.getElementById('piece');
  piece.classList.remove('moving');
  // force reflow
  void piece.offsetWidth;
  piece.classList.add('moving');
  placePiece(newPos);
  setTimeout(() => piece.classList.remove('moving'), 400);
}

function nextTurn() {
  setActivePlayer(state.currentPlayer === 1 ? 2 : 1);
}

// ═══════════════════════════════════════════
//  WIN
// ═══════════════════════════════════════════
function triggerWin(player, rallies) {
  state.gameOver = true;
  const p = PLAYERS[player];
  playWinSound();

  document.getElementById('win-avatar').textContent = p.avatar;
  const title = document.getElementById('win-title');
  title.textContent = `${p.name} Wins!`;
  title.className = `win-title p${player}`;
  document.getElementById('win-stats').textContent = `Finished in ${rallies} ${rallies === 1 ? 'rally' : 'rallies'}`;

  showScreen('win-screen');
  spawnConfetti(player);
}

function spawnConfetti(player) {
  const screen = document.getElementById('win-screen');
  const colors = player === 1
    ? ['#ff3399','#ff99cc','#ff66bb','#fff','#f0c040']
    : ['#3399ff','#99ccff','#66bbff','#fff','#f0c040'];

  for (let i = 0; i < 90; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.setProperty('--x', Math.random() * 100 + 'vw');
    el.style.setProperty('--dur', (1.5 + Math.random() * 2) + 's');
    el.style.setProperty('--delay', (Math.random() * 1.5) + 's');
    el.style.setProperty('--rot', (Math.random() * 720 - 360) + 'deg');
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    screen.appendChild(el);
  }
}

// ═══════════════════════════════════════════
//  SCREENS
// ═══════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ═══════════════════════════════════════════
//  COIN TOSS
// ═══════════════════════════════════════════
document.getElementById('toss-btn').addEventListener('click', () => {
  const btn = document.getElementById('toss-btn');
  const coin = document.getElementById('coin');
  const result = document.getElementById('toss-result');
  btn.disabled = true;
  result.textContent = '';

  const winner = Math.random() < 0.5 ? 1 : 2;
  // heads = P1, tails = P2
  // land on heads face (0 deg) for P1 win, tails (180 deg rotation) for P2 win
  const extraSpins = (5 + Math.floor(Math.random() * 4)) * 360; // 5-8 full rotations
  const landAngle = winner === 1 ? extraSpins : extraSpins + 180;
  coin.style.setProperty('--flip-end', landAngle + 'deg');

  playCoinSound();
  coin.classList.add('flipping');

  setTimeout(() => {
    coin.classList.remove('flipping');
    coin.style.transform = `rotateY(${landAngle % 360}deg)`;
    const p = PLAYERS[winner];
    result.textContent = `${winner === 1 ? '👑 Heads' : '⚡ Tails'} — ${p.name} goes first!`;

    setTimeout(() => {
      startGame(winner);
    }, 1200);
  }, 1700);
});

// ═══════════════════════════════════════════
//  START / RESET
// ═══════════════════════════════════════════
function startGame(firstPlayer) {
  state.currentPlayer = firstPlayer;
  state.piecePos = 0;
  state.rally = 0;
  state.rolling = false;
  state.gameOver = false;

  buildBoard();
  updateRally();
  showScreen('game-screen');

  // place piece after screen is visible
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      placePiece(0);
      setActivePlayer(firstPlayer);
    });
  });
}

document.getElementById('dice').addEventListener('click', rollDice);

document.getElementById('play-again-btn').addEventListener('click', () => {
  // clear old confetti
  document.querySelectorAll('.confetti-piece').forEach(e => e.remove());
  // reset coin
  const coin = document.getElementById('coin');
  coin.style.transform = '';
  document.getElementById('toss-result').textContent = '';
  document.getElementById('toss-btn').disabled = false;
  document.getElementById('roll-result').textContent = '';
  document.getElementById('dice').textContent = '🎲';
  showScreen('coin-screen');
});

// handle board resize (responsive piece placement)
window.addEventListener('resize', () => {
  if (document.getElementById('game-screen').classList.contains('active')) {
    placePiece(state.piecePos);
  }
});
</script>
