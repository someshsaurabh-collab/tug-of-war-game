<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tug of War - Dice Game</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Segoe UI', sans-serif;
  background: #1a1a2e;
  color: #eee;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.screen { display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; min-height: 100vh; }
.screen.active { display: flex; }

/* ───────── COIN TOSS ───────── */
#coin-screen { gap: 24px; }
#coin-screen h1 { font-size: 2.4rem; letter-spacing: 2px; color: #f0c040; text-shadow: 0 0 20px #f0c04066; }
#coin-screen p  { font-size: 1.1rem; color: #aaa; }

.coin-container { perspective: 600px; }
.coin {
  width: 120px; height: 120px; border-radius: 50%;
  position: relative; transform-style: preserve-3d;
}
.coin.flipping { animation: coinFlip 1.6s ease-out forwards; }
.coin-face {
  position: absolute; inset: 0; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 2.8rem; backface-visibility: hidden;
  border: 4px solid #b8860b;
}
.coin-heads { background: radial-gradient(circle at 35% 35%, #ffd700, #b8860b); }
.coin-tails  { background: radial-gradient(circle at 35% 35%, #c0c0c0, #696969); transform: rotateY(180deg); }
@keyframes coinFlip {
  0%   { transform: rotateY(0); }
  100% { transform: rotateY(var(--flip-end)); }
}

#toss-btn {
  padding: 14px 40px; font-size: 1.1rem; font-weight: 700;
  background: linear-gradient(135deg, #f0c040, #e07b00);
  border: none; border-radius: 30px; color: #1a1a2e;
  cursor: pointer; letter-spacing: 1px;
  box-shadow: 0 4px 20px #f0c04044;
  transition: transform 0.15s, box-shadow 0.15s;
}
#toss-btn:hover:not(:disabled) { transform: scale(1.06); }
#toss-btn:disabled { opacity: 0.5; cursor: not-allowed; }
#toss-result { font-size: 1.3rem; font-weight: 700; color: #f0c040; min-height: 2rem; text-align: center; }

/* ───────── GAME SCREEN ───────── */
#game-screen { gap: 0; padding: 16px; }

.game-header {
  display: flex; align-items: center; justify-content: space-between;
  width: 100%; max-width: 960px; margin-bottom: 16px;
}
.game-title { font-size: 1.5rem; color: #f0c040; letter-spacing: 2px; font-weight: 800; }
.rally-box {
  background: #16213e; border: 2px solid #f0c04066;
  border-radius: 12px; padding: 6px 18px; text-align: center;
}
.rally-label { font-size: 0.7rem; color: #aaa; letter-spacing: 1px; text-transform: uppercase; }
.rally-count { font-size: 1.6rem; font-weight: 800; color: #f0c040; }

/* ───────── PLAYER CARDS ───────── */
.players-row {
  display: flex; align-items: center; justify-content: space-between;
  width: 100%; max-width: 960px; margin-bottom: 16px; gap: 12px;
}
.player-card {
  flex: 1; border-radius: 16px; padding: 12px 16px;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  border: 3px solid transparent; transition: all 0.3s;
}
.player-card.p1 { background: #2d0a1a; border-color: #cc005533; }
.player-card.p2 { background: #0a1a2d; border-color: #0055cc33; }
.player-card.active.p1 { border-color: #ff3399; box-shadow: 0 0 24px #ff339966; }
.player-card.active.p2 { border-color: #3399ff; box-shadow: 0 0 24px #3399ff66; }
.player-avatar { font-size: 2.6rem; line-height: 1; }
.player-name   { font-size: 1rem; font-weight: 700; letter-spacing: 1px; }
.player-card.p1 .player-name { color: #ff3399; }
.player-card.p2 .player-name { color: #3399ff; }
.turn-indicator {
  font-size: 0.7rem; font-weight: 700; letter-spacing: 1px;
  padding: 3px 10px; border-radius: 20px; opacity: 0; transition: opacity 0.3s;
}
.player-card.active .turn-indicator { opacity: 1; }
.player-card.p1 .turn-indicator { background: #ff339933; color: #ff3399; }
.player-card.p2 .turn-indicator { background: #3399ff33; color: #3399ff; }

/* ───────── BOARD ───────── */
.board-wrapper { width: 100%; max-width: 960px; margin-bottom: 20px; }
.board {
  display: flex; width: 100%;
  border-radius: 12px; overflow: visible;
  box-shadow: 0 8px 40px #00000088;
  position: relative; /* piece is absolutely positioned here */
}

/* Each cell is a flex column, piece lives inside */
.cell {
  flex: 1; min-width: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  position: relative;
  padding: 6px 2px;
  aspect-ratio: 1 / 1.3;
}

/* Finish cells — vertical label, fixed narrow width */
.cell.finish-p1,
.cell.finish-p2 {
  flex: 0 0 52px;
  writing-mode: vertical-lr;
  font-size: 0.6rem; font-weight: 800; letter-spacing: 2px;
  text-transform: uppercase; color: #fff;
  align-items: center; justify-content: center;
  padding: 8px 4px; white-space: nowrap;
}
.cell.finish-p1 { transform: rotate(180deg); }

/* Step number label */
.cell-num { font-size: 0.8rem; font-weight: 700; color: rgba(255,255,255,0.85); pointer-events: none; }
.cell.p1-1 .cell-num,
.cell.p2-1 .cell-num { color: rgba(0,0,0,0.5); }
.cell.start { background: #2e7d32; }
.cell.start .cell-num { font-size: 0.7rem; letter-spacing: 1px; color: #fff; }

/* ── GRADIENT COLORS — computed via CSS variables ── */
/* P1 side: hot pink → deep magenta. finish = darkest */
.cell.finish-p1 { background: #7b003c; }
.cell.p1-6      { background: #a0004e; }
.cell.p1-5      { background: #c2185b; }
.cell.p1-4      { background: #d81b60; }
.cell.p1-3      { background: #e91e8c; }
.cell.p1-2      { background: #f48fb1; }
.cell.p1-1      { background: #fce4ec; }

/* P2 side: pale blue → deep navy. finish = darkest */
.cell.finish-p2 { background: #003080; }
.cell.p2-6      { background: #0d47a1; }
.cell.p2-5      { background: #1565c0; }
.cell.p2-4      { background: #1e88e5; }
.cell.p2-3      { background: #42a5f5; }
.cell.p2-2      { background: #90caf9; }
.cell.p2-1      { background: #e3f2fd; }

/* ───────── PIECE ───────── */
.piece {
  width: 30px; height: 30px; border-radius: 50%;
  background: radial-gradient(circle at 35% 30%, #fffde7, #f9a825 60%, #e65100);
  border: 2.5px solid #fff;
  box-shadow: 0 2px 8px #0008, 0 0 0 2px #f9a82566;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.85rem;
  z-index: 10; pointer-events: none;
  position: absolute;
  transition: left 0.18s cubic-bezier(0.4,0,0.2,1),
              top  0.18s cubic-bezier(0.4,0,0.2,1);
}
/* hop up on each step */
.piece.hop { animation: pieceHop 0.18s ease; }
@keyframes pieceHop {
  0%   { transform: scale(1)    translateY(0);     }
  45%  { transform: scale(1.25) translateY(-10px); }
  100% { transform: scale(1)    translateY(0);     }
}

/* ───────── REAL DICE ───────── */
.dice-area {
  display: flex; flex-direction: column; align-items: center; gap: 10px;
  margin-bottom: 6px;
}

/* 3-D dice built with CSS */
.dice-wrap { perspective: 400px; }
.dice {
  width: 70px; height: 70px;
  position: relative; transform-style: preserve-3d;
  cursor: pointer;
  animation: diceIdle 4s ease-in-out infinite;
}
.dice:hover { animation: none; transform: rotateX(-10deg) rotateY(10deg); }
.dice.rolling { animation: diceRoll 1.1s cubic-bezier(0.22,0.8,0.4,1) forwards; }
@keyframes diceIdle {
  0%,100% { transform: rotateX(-8deg) rotateY(10deg); }
  50%      { transform: rotateX(-12deg) rotateY(15deg); }
}
@keyframes diceRoll {
  0%   { transform: rotateX(0deg)    rotateY(0deg)    rotateZ(0deg); }
  15%  { transform: rotateX(270deg)  rotateY(180deg)  rotateZ(90deg); }
  35%  { transform: rotateX(540deg)  rotateY(450deg)  rotateZ(180deg); }
  55%  { transform: rotateX(720deg)  rotateY(630deg)  rotateZ(225deg); }
  72%  { transform: rotateX(810deg)  rotateY(720deg)  rotateZ(240deg); }
  85%  { transform: rotateX(var(--rx-mid)) rotateY(var(--ry-mid)) rotateZ(10deg); }
  93%  { transform: rotateX(var(--rx-near)) rotateY(var(--ry-near)) rotateZ(3deg); }
  100% { transform: rotateX(var(--rx)) rotateY(var(--ry)) rotateZ(0deg); }
}

.face {
  position: absolute; width: 70px; height: 70px;
  background: #fff;
  border-radius: 10px;
  border: 2px solid #ddd;
  display: grid;
  box-shadow: inset 0 0 6px #0001;
}
/* face positions */
.face-1 { transform: rotateY(0deg)    translateZ(35px); }
.face-6 { transform: rotateY(180deg)  translateZ(35px); }
.face-2 { transform: rotateY(90deg)   translateZ(35px); }
.face-5 { transform: rotateY(-90deg)  translateZ(35px); }
.face-3 { transform: rotateX(90deg)   translateZ(35px); }
.face-4 { transform: rotateX(-90deg)  translateZ(35px); }

/* pip dots */
.pip {
  width: 11px; height: 11px; border-radius: 50%;
  background: #1a1a2e;
  box-shadow: inset 0 1px 2px #0004;
  justify-self: center; align-self: center;
}
/* grid layouts per face */
.face-1 { grid-template: 1fr / 1fr; align-items: center; justify-items: center; }
.face-2 { grid-template: 1fr 1fr / 1fr; padding: 10px 0; }
.face-2 .pip:nth-child(2) { align-self: end; }
.face-3 { grid-template: 1fr 1fr 1fr / 1fr; padding: 8px 0; }
.face-4 { grid-template: 1fr 1fr / 1fr 1fr; padding: 8px; }
.face-5 { grid-template: 1fr 1fr 1fr / 1fr 1fr; padding: 8px; align-items: center; }
.face-5 .pip.center { grid-column: 1 / -1; justify-self: center; }
.face-6 { grid-template: 1fr 1fr 1fr / 1fr 1fr; padding: 8px; }

.dice-label { font-size: 0.8rem; color: #aaa; letter-spacing: 1px; text-transform: uppercase; }
#roll-result { font-size: 1rem; font-weight: 700; min-height: 1.4rem; color: #f0c040; text-align: center; }

/* ───────── WIN SCREEN ───────── */
#win-screen { gap: 20px; position: relative; overflow: hidden; }
.win-content { z-index: 10; display: flex; flex-direction: column; align-items: center; gap: 16px; text-align: center; }
.win-avatar { font-size: 5rem; animation: winBounce 0.8s ease infinite alternate; }
@keyframes winBounce { from { transform: scale(1) translateY(0); } to { transform: scale(1.12) translateY(-12px); } }
.win-title { font-size: 2.8rem; font-weight: 900; letter-spacing: 3px; }
.win-title.p1 { color: #ff3399; text-shadow: 0 0 30px #ff339966; }
.win-title.p2 { color: #3399ff; text-shadow: 0 0 30px #3399ff66; }
.win-subtitle { font-size: 1.2rem; color: #ccc; }
.win-stats    { font-size: 1rem; color: #aaa; }
#play-again-btn {
  padding: 14px 40px; font-size: 1.1rem; font-weight: 700;
  background: linear-gradient(135deg, #f0c040, #e07b00);
  border: none; border-radius: 30px; color: #1a1a2e;
  cursor: pointer; letter-spacing: 1px;
  box-shadow: 0 4px 20px #f0c04044;
  transition: transform 0.15s; margin-top: 10px;
}
#play-again-btn:hover { transform: scale(1.06); }

/* confetti */
.confetti-piece {
  position: absolute; width: 10px; height: 14px; border-radius: 2px;
  opacity: 0; animation: confettiFall var(--dur) var(--delay) ease-in forwards;
  top: -20px; left: var(--x);
}
@keyframes confettiFall {
  0%   { opacity: 1;   transform: translateY(0)    rotate(0deg); }
  100% { opacity: 0.3; transform: translateY(110vh) rotate(var(--rot)); }
}
</style>
</head>
<body>

<!-- ══════════ COIN TOSS ══════════ -->
<div id="coin-screen" class="screen active">
  <h1>⚔️ TUG OF WAR</h1>
  <p>Flip the coin to decide who goes first!</p>
  <div class="coin-container">
    <div class="coin" id="coin">
      <div class="coin-face coin-heads">👑</div>
      <div class="coin-face coin-tails">⚡</div>
    </div>
  </div>
  <button id="toss-btn">Flip Coin</button>
  <div id="toss-result"></div>
</div>

<!-- ══════════ GAME ══════════ -->
<div id="game-screen" class="screen">
  <div class="game-header">
    <div class="game-title">⚔️ TUG OF WAR</div>
    <div class="rally-box">
      <div class="rally-label">Rally</div>
      <div class="rally-count" id="rally-count">0</div>
    </div>
  </div>

  <div class="players-row">
    <div class="player-card p1" id="card-p1">
      <div class="player-avatar">🦁</div>
      <div class="player-name">PLAYER 1</div>
      <div class="turn-indicator">YOUR TURN</div>
    </div>

    <div class="dice-area">
      <div class="dice-wrap">
        <div class="dice" id="dice" title="Click to roll">
          <!-- face 1 (front) -->
          <div class="face face-1"><div class="pip"></div></div>
          <!-- face 6 (back) -->
          <div class="face face-6">
            <div class="pip"></div><div class="pip"></div>
            <div class="pip"></div><div class="pip"></div>
            <div class="pip"></div><div class="pip"></div>
          </div>
          <!-- face 2 (right) -->
          <div class="face face-2"><div class="pip"></div><div class="pip"></div></div>
          <!-- face 5 (left) -->
          <div class="face face-5">
            <div class="pip"></div><div class="pip"></div>
            <div class="pip center"></div>
            <div class="pip"></div><div class="pip"></div>
          </div>
          <!-- face 3 (top) -->
          <div class="face face-3">
            <div class="pip"></div><div class="pip"></div><div class="pip"></div>
          </div>
          <!-- face 4 (bottom) -->
          <div class="face face-4">
            <div class="pip"></div><div class="pip"></div>
            <div class="pip"></div><div class="pip"></div>
          </div>
        </div>
      </div>
      <div class="dice-label">Tap to Roll</div>
      <div id="roll-result"></div>
    </div>

    <div class="player-card p2" id="card-p2">
      <div class="player-avatar">🐯</div>
      <div class="player-name">PLAYER 2</div>
      <div class="turn-indicator">YOUR TURN</div>
    </div>
  </div>

  <div class="board-wrapper">
    <div class="board" id="board"></div>
  </div>
</div>

<!-- ══════════ WIN ══════════ -->
<div id="win-screen" class="screen">
  <div class="win-content">
    <div class="win-avatar" id="win-avatar">🦁</div>
    <div class="win-title" id="win-title">PLAYER 1 WINS!</div>
    <div class="win-subtitle">🎉 Congratulations!</div>
    <div class="win-stats" id="win-stats">Finished in 12 rallies</div>
    <button id="play-again-btn">Play Again</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════
//  AUDIO
// ══════════════════════════════════════════
let audioCtx;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playDiceSound() {
  const ctx = getAudioCtx();
  [0, 0.08, 0.18, 0.3, 0.44, 0.6].forEach(t => {
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = 'square';
    o.frequency.setValueAtTime(300 + Math.random() * 200, ctx.currentTime + t);
    g.gain.setValueAtTime(0.12, ctx.currentTime + t);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.07);
    o.start(ctx.currentTime + t); o.stop(ctx.currentTime + t + 0.08);
  });
}
function playCoinSound() {
  const ctx = getAudioCtx();
  [0, 0.15, 0.32, 0.5, 0.65, 0.77].forEach(t => {
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = 880 + Math.random() * 440; o.type = 'sine';
    g.gain.setValueAtTime(0.18, ctx.currentTime + t);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.12);
    o.start(ctx.currentTime + t); o.stop(ctx.currentTime + t + 0.13);
  });
}
function playWinSound() {
  const ctx = getAudioCtx();
  [523, 659, 784, 1047].forEach((f, i) => {
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = f; o.type = 'sine';
    g.gain.setValueAtTime(0.22, ctx.currentTime + i * 0.18);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.18 + 0.5);
    o.start(ctx.currentTime + i * 0.18); o.stop(ctx.currentTime + i * 0.18 + 0.55);
  });
}

// ══════════════════════════════════════════
//  DICE — rotation targets per face value
//  (so the correct face lands facing the camera)
// ══════════════════════════════════════════
const FACE_ROTATIONS = {
  1: { rx: '0deg',    ry: '0deg'   },
  2: { rx: '0deg',    ry: '-90deg' },
  3: { rx: '-90deg',  ry: '0deg'   },
  4: { rx: '90deg',   ry: '0deg'   },
  5: { rx: '0deg',    ry: '90deg'  },
  6: { rx: '0deg',    ry: '180deg' },
};

// ══════════════════════════════════════════
//  BOARD DEFINITION
//  index 0 = finish-p1, index 7 = start, index 14 = finish-p2
// ══════════════════════════════════════════
const CELLS = [
  { id: 'finish-p1', cls: 'finish-p1', label: 'P1 Finish' },
  { id: 'p1-6',      cls: 'p1-6',      label: '6' },
  { id: 'p1-5',      cls: 'p1-5',      label: '5' },
  { id: 'p1-4',      cls: 'p1-4',      label: '4' },
  { id: 'p1-3',      cls: 'p1-3',      label: '3' },
  { id: 'p1-2',      cls: 'p1-2',      label: '2' },
  { id: 'p1-1',      cls: 'p1-1',      label: '1' },
  { id: 'start',     cls: 'start',     label: 'START' },
  { id: 'p2-1',      cls: 'p2-1',      label: '1' },
  { id: 'p2-2',      cls: 'p2-2',      label: '2' },
  { id: 'p2-3',      cls: 'p2-3',      label: '3' },
  { id: 'p2-4',      cls: 'p2-4',      label: '4' },
  { id: 'p2-5',      cls: 'p2-5',      label: '5' },
  { id: 'p2-6',      cls: 'p2-6',      label: '6' },
  { id: 'finish-p2', cls: 'finish-p2', label: 'P2 Finish' },
];
// pos -7..7 maps to index 0..14
const posToIndex = pos => pos + 7;

// ══════════════════════════════════════════
//  BUILD BOARD
// ══════════════════════════════════════════
function buildBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  CELLS.forEach(c => {
    const div = document.createElement('div');
    div.className = `cell ${c.cls}`;
    div.id = `cell-${c.id}`;
    const span = document.createElement('span');
    span.className = 'cell-num';
    span.textContent = c.label;
    div.appendChild(span);
    board.appendChild(div);
  });
}

// ══════════════════════════════════════════
//  PIECE — absolutely positioned on board
// ══════════════════════════════════════════
let pieceEl = null;

function createPiece() {
  if (pieceEl) pieceEl.remove();
  pieceEl = document.createElement('div');
  pieceEl.className = 'piece';
  pieceEl.textContent = '⭐';
  document.getElementById('board').appendChild(pieceEl);
}

function getCellCenter(pos) {
  const idx = posToIndex(pos);
  const cells = document.querySelectorAll('.cell');
  const cell = cells[idx];
  const board = document.getElementById('board');
  const br = board.getBoundingClientRect();
  const cr = cell.getBoundingClientRect();
  return {
    left: cr.left - br.left + cr.width  / 2 - 15,
    top:  cr.top  - br.top  + cr.height / 2 - 15,
  };
}

function snapPiece(pos) {
  const { left, top } = getCellCenter(pos);
  pieceEl.style.transition = 'none';
  pieceEl.style.left = left + 'px';
  pieceEl.style.top  = top  + 'px';
}

// Step-by-step animated movement; returns a Promise that resolves when done
function movePieceAnimated(fromPos, toPos) {
  return new Promise(resolve => {
    const dir = toPos > fromPos ? 1 : -1;
    const steps = [];
    for (let p = fromPos + dir; dir > 0 ? p <= toPos : p >= toPos; p += dir) {
      steps.push(p);
    }
    const STEP_MS = 220;
    let i = 0;
    function doStep() {
      if (i >= steps.length) { resolve(); return; }
      const pos = steps[i++];
      const { left, top } = getCellCenter(pos);
      pieceEl.style.transition = `left ${STEP_MS}ms cubic-bezier(0.4,0,0.2,1), top ${STEP_MS}ms cubic-bezier(0.4,0,0.2,1)`;
      pieceEl.style.left = left + 'px';
      pieceEl.style.top  = top  + 'px';
      // hop animation
      pieceEl.classList.remove('hop');
      void pieceEl.offsetWidth;
      pieceEl.classList.add('hop');
      setTimeout(doStep, STEP_MS);
    }
    doStep();
  });
}

// ══════════════════════════════════════════
//  GAME STATE
// ══════════════════════════════════════════
const state = {
  currentPlayer: 1,
  piecePos: 0,
  rally: 0,
  rolling: false,
  gameOver: false,
};
const PLAYERS = {
  1: { name: 'Player 1', avatar: '🦁', cardId: 'card-p1', dir: -1, finish: -7 },
  2: { name: 'Player 2', avatar: '🐯', cardId: 'card-p2', dir:  1, finish:  7 },
};

function setActivePlayer(p) {
  state.currentPlayer = p;
  document.getElementById('card-p1').classList.toggle('active', p === 1);
  document.getElementById('card-p2').classList.toggle('active', p === 2);
}
function updateRally() {
  document.getElementById('rally-count').textContent = state.rally;
}

// ══════════════════════════════════════════
//  DICE ROLL
// ══════════════════════════════════════════
async function rollDice() {
  if (state.rolling || state.gameOver) return;
  state.rolling = true;

  const dice = document.getElementById('dice');
  playDiceSound();
  document.getElementById('roll-result').textContent = '';

  const roll = Math.floor(Math.random() * 6) + 1;
  const rot  = FACE_ROTATIONS[roll];

  // mid/near approach angles for the slow-down keyframes
  const rx = parseInt(rot.rx), ry = parseInt(rot.ry);
  dice.style.setProperty('--rx',      rot.rx);
  dice.style.setProperty('--ry',      rot.ry);
  dice.style.setProperty('--rx-mid',  (rx + 25) + 'deg');
  dice.style.setProperty('--ry-mid',  (ry + 20) + 'deg');
  dice.style.setProperty('--rx-near', (rx + 8)  + 'deg');
  dice.style.setProperty('--ry-near', (ry + 5)  + 'deg');

  dice.classList.remove('rolling');
  void dice.offsetWidth;
  dice.classList.add('rolling');

  // wait for animation (1.1s) then snap
  await new Promise(r => setTimeout(r, 1100));
  dice.classList.remove('rolling');
  dice.style.transform = `rotateX(${rot.rx}) rotateY(${rot.ry})`;

  const player    = PLAYERS[state.currentPlayer];
  const newPos    = state.piecePos + player.dir * roll;
  const finishPos = player.finish;

  state.rally++;
  updateRally();

  const overshoot =
    (player.dir === -1 && newPos < finishPos) ||
    (player.dir ===  1 && newPos > finishPos);

  if (overshoot) {
    document.getElementById('roll-result').textContent = `Rolled ${roll} — Overshoot! No move.`;
    nextTurn();
    state.rolling = false;
  } else {
    document.getElementById('roll-result').textContent =
      newPos === finishPos ? `Rolled ${roll} — Exact finish! 🎉` : `Rolled ${roll}`;
    const fromPos = state.piecePos;
    state.piecePos = newPos;
    await movePieceAnimated(fromPos, newPos);
    if (newPos === finishPos) {
      setTimeout(() => triggerWin(state.currentPlayer, state.rally), 300);
    } else {
      nextTurn();
    }
    state.rolling = false;
  }
}

function nextTurn() {
  setActivePlayer(state.currentPlayer === 1 ? 2 : 1);
}

// ══════════════════════════════════════════
//  WIN
// ══════════════════════════════════════════
function triggerWin(player, rallies) {
  state.gameOver = true;
  playWinSound();
  const p = PLAYERS[player];
  document.getElementById('win-avatar').textContent = p.avatar;
  const title = document.getElementById('win-title');
  title.textContent = `${p.name} Wins!`;
  title.className = `win-title p${player}`;
  document.getElementById('win-stats').textContent =
    `Finished in ${rallies} ${rallies === 1 ? 'rally' : 'rallies'}`;
  showScreen('win-screen');
  spawnConfetti(player);
}

function spawnConfetti(player) {
  const screen = document.getElementById('win-screen');
  const colors = player === 1
    ? ['#ff3399','#ff99cc','#ff66bb','#fff','#f0c040']
    : ['#3399ff','#99ccff','#66bbff','#fff','#f0c040'];
  for (let i = 0; i < 90; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.setProperty('--x', Math.random() * 100 + 'vw');
    el.style.setProperty('--dur', (1.5 + Math.random() * 2) + 's');
    el.style.setProperty('--delay', (Math.random() * 1.5) + 's');
    el.style.setProperty('--rot', (Math.random() * 720 - 360) + 'deg');
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    screen.appendChild(el);
  }
}

// ══════════════════════════════════════════
//  SCREENS
// ══════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ══════════════════════════════════════════
//  COIN TOSS
// ══════════════════════════════════════════
document.getElementById('toss-btn').addEventListener('click', () => {
  const btn = document.getElementById('toss-btn');
  btn.disabled = true;
  document.getElementById('toss-result').textContent = '';
  const coin = document.getElementById('coin');
  const winner = Math.random() < 0.5 ? 1 : 2;
  const extraSpins = (5 + Math.floor(Math.random() * 4)) * 360;
  const landAngle = winner === 1 ? extraSpins : extraSpins + 180;
  coin.style.setProperty('--flip-end', landAngle + 'deg');
  playCoinSound();
  coin.classList.add('flipping');
  setTimeout(() => {
    coin.classList.remove('flipping');
    coin.style.transform = `rotateY(${landAngle % 360}deg)`;
    const p = PLAYERS[winner];
    document.getElementById('toss-result').textContent =
      `${winner === 1 ? '👑 Heads' : '⚡ Tails'} — ${p.name} goes first!`;
    setTimeout(() => startGame(winner), 1200);
  }, 1700);
});

// ══════════════════════════════════════════
//  START / RESET
// ══════════════════════════════════════════
function startGame(firstPlayer) {
  state.currentPlayer = firstPlayer;
  state.piecePos = 0;
  state.rally = 0;
  state.rolling = false;
  state.gameOver = false;

  buildBoard();
  createPiece();
  updateRally();

  // reset dice visual
  const dice = document.getElementById('dice');
  dice.style.transform = '';
  dice.style.animation = '';

  showScreen('game-screen');
  requestAnimationFrame(() => requestAnimationFrame(() => {
    snapPiece(0);
    setActivePlayer(firstPlayer);
    dice.style.animation = '';
    void dice.offsetWidth;
    dice.style.animation = null;
  }));
}

document.getElementById('dice').addEventListener('click', rollDice);

document.getElementById('play-again-btn').addEventListener('click', () => {
  document.querySelectorAll('.confetti-piece').forEach(e => e.remove());
  const coin = document.getElementById('coin');
  coin.style.transform = '';
  document.getElementById('toss-result').textContent = '';
  document.getElementById('toss-btn').disabled = false;
  document.getElementById('roll-result').textContent = '';
  showScreen('coin-screen');
});
</script>
</body>
